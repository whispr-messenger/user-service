name: CD Pipeline

on:
  workflow_run:
    workflows: [🚀 CI Pipeline]
    types: [completed]
    branches: [main, deploy/avant-preprod, deploy/preprod]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string
      target_env:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - preprod
          - prod
        default: 'prod'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  update-deployment:
    if: ${{ (github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: Update Deployment Manifest

    permissions:
      contents: write
      packages: read

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ACTIONS_CD }}
          private-key: ${{ secrets.ACTIONS_CD_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            user-service
            infrastructure

      - name: Checkout user-service
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: user-service
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate and determine commit SHA
        id: validate_commit
        working-directory: user-service
        run: |
          # Determine the commit SHA based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use input or current commit
            if [ -n "${{ inputs.commit_sha }}" ]; then
              COMMIT_SHA="${{ inputs.commit_sha }}"
              echo "Validating manually provided commit SHA: $COMMIT_SHA"

              # Validate SHA format (40 hex characters for full SHA or 7+ for short SHA)
              if ! echo "$COMMIT_SHA" | grep -qE '^[a-fA-F0-9]{7,40}$'; then
                echo "❌ Error: Invalid commit SHA format. Must be 7-40 hexadecimal characters."
                exit 1
              fi

              # Verify the commit exists in the repository
              if ! git rev-parse --verify "${COMMIT_SHA}^{commit}" >/dev/null 2>&1; then
                echo "❌ Error: Commit SHA '${COMMIT_SHA}' does not exist in the repository."
                echo "Please provide a valid commit SHA from the main branch."
                exit 1
              fi

              # Get the full SHA if a short SHA was provided
              COMMIT_SHA=$(git rev-parse --verify "${COMMIT_SHA}^{commit}")
              echo "✅ Commit SHA validated successfully"
              echo "Using manually provided commit SHA: $COMMIT_SHA"
            else
              COMMIT_SHA="${{ github.sha }}"
              echo "Using current commit SHA: $COMMIT_SHA"
            fi
          else
            # Automatic trigger from CI workflow
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            # If empty, use github.sha as fallback
            if [ -z "$COMMIT_SHA" ]; then
              COMMIT_SHA="${{ github.sha }}"
              echo "Using github.sha as fallback: $COMMIT_SHA"
            fi
          fi

          # Store COMMIT_SHA as output for use in subsequent steps
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Verify image exists in registry
        run: |
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')

          echo "Verifying image existence: ${FULL_IMAGE}"
          # We use docker manifest inspect which is available in modern docker versions
          if ! docker manifest inspect "${FULL_IMAGE}" > /dev/null 2>&1; then
            echo "❌ Error: Docker image ${FULL_IMAGE} not found in registry."
            echo "The CI pipeline might have failed to build or push the image for this commit."
            exit 1
          fi
          echo "✅ Image found in registry"

      - name: Resolve target environment and infra branch
        id: resolve_targets
        run: |
          # Determine target_env: explicit input on dispatch, derived from branch on workflow_run
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ inputs.target_env || 'prod' }}"
          else
            TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ "$TRIGGER_BRANCH" = "main" ]; then
              TARGET_ENV="prod"
            else
              TARGET_ENV="preprod"
            fi
          fi

          BASE="k8s/whispr"
          case "${TARGET_ENV}" in
            preprod)
              DEPLOYMENTS="${BASE}/preprod/user-service/deployment.yaml"
              MIGRATION_JOBS="${BASE}/preprod/user-service/migration-job.yaml"
              INFRA_BRANCH="deploy/preprod"
              ;;
            prod)
              DEPLOYMENTS="${BASE}/prod/user-service/deployment.yaml ${BASE}/production/user-service/deployment.yaml"
              MIGRATION_JOBS="${BASE}/prod/user-service/migration-job.yaml"
              INFRA_BRANCH="main"
              ;;
            *)
              echo "❌ Error: Unknown target_env '${TARGET_ENV}' (expected 'preprod' or 'prod')."
              exit 1
              ;;
          esac

          echo "Target environment: ${TARGET_ENV}"
          echo "Infra branch: ${INFRA_BRANCH}"
          echo "Deployments: ${DEPLOYMENTS}"
          echo "Migration jobs: ${MIGRATION_JOBS}"

          {
            echo "target_env=${TARGET_ENV}"
            echo "infra_branch=${INFRA_BRANCH}"
            echo "deployments<<EOF"
            echo "${DEPLOYMENTS}"
            echo "EOF"
            echo "migration_jobs<<EOF"
            echo "${MIGRATION_JOBS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout infrastructure repository
        uses: actions/checkout@v5
        with:
          repository: whispr-messenger/infrastructure
          path: infrastructure
          ref: ${{ steps.resolve_targets.outputs.infra_branch }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Validate deployment and migration-job manifest paths
        working-directory: infrastructure
        run: |
          for FILE in ${{ steps.resolve_targets.outputs.deployments }}; do
            if [ ! -f "$FILE" ]; then
              echo "❌ Error: Deployment manifest not found at $FILE"
              exit 1
            fi
            echo "✅ Deployment manifest found at $FILE"
          done

          for FILE in ${{ steps.resolve_targets.outputs.migration_jobs }}; do
            if [ -f "$FILE" ]; then
              echo "✅ Migration job manifest found at $FILE"
            else
              echo "ℹ️ No migration job at $FILE — skipping"
            fi
          done

      - name: Update image tag in deployment
        id: update_image
        working-directory: infrastructure
        run: |
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')

          echo "Commit SHA: $COMMIT_SHA"
          echo "Short SHA: $SHORT_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Updating deployment image to: ${FULL_IMAGE}"

          for FILE in ${{ steps.resolve_targets.outputs.deployments }}; do
            echo "Updating Deployment ${FILE}"
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${FILE}"
          done

          for FILE in ${{ steps.resolve_targets.outputs.migration_jobs }}; do
            if [ -f "$FILE" ]; then
              echo "Updating Job ${FILE}"
              yq -i 'select(.kind == "Job").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${FILE}"
            fi
          done

      - name: Verify update
        working-directory: infrastructure
        run: |
          for FILE in ${{ steps.resolve_targets.outputs.deployments }}; do
            echo "=== ${FILE} (Deployment) ==="
            yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' "${FILE}"
          done

          for FILE in ${{ steps.resolve_targets.outputs.migration_jobs }}; do
            if [ -f "$FILE" ]; then
              echo "=== ${FILE} (Job) ==="
              yq 'select(.kind == "Job").spec.template.spec.containers[0].image' "${FILE}"
            fi
          done

      - name: Commit and push changes
        working-directory: infrastructure
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          TARGET_ENV="${{ steps.resolve_targets.outputs.target_env }}"
          INFRA_BRANCH="${{ steps.resolve_targets.outputs.infra_branch }}"

          # Build commit message based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_MSG="🔧 chore(deploy/user-service): update ${TARGET_ENV} image to ${SHORT_SHA} (manual trigger)"
          else
            COMMIT_MSG="🔧 chore(deploy/user-service): update ${TARGET_ENV} image to ${SHORT_SHA}"
          fi

          git add -A
          git commit -m "${COMMIT_MSG}"

          git pull origin "${INFRA_BRANCH}" --rebase
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/whispr-messenger/infrastructure.git HEAD:"${INFRA_BRANCH}"
