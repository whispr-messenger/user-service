name: CD Pipeline

on:
  workflow_run:
    workflows: [🚀 CI Pipeline]
    types: [completed]
    branches: [main, deploy/avant-preprod, deploy/preprod]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  update-deployment:
    if: ${{ (github.event.workflow_run.event == 'push') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    name: Update Deployment Manifest

    permissions:
      contents: write
      packages: read

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ACTIONS_CD }}
          private_key: ${{ secrets.ACTIONS_CD_PRIVATE_KEY }}

      - name: Checkout user-service
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: user-service
          ref: ${{ github.event.workflow_run.head_branch || 'main' }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate and determine commit SHA
        id: validate_commit
        working-directory: user-service
        run: |
          # Determine the commit SHA based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use input or current commit
            if [ -n "${{ inputs.commit_sha }}" ]; then
              COMMIT_SHA="${{ inputs.commit_sha }}"
              echo "Validating manually provided commit SHA: $COMMIT_SHA"

              # Validate SHA format (40 hex characters for full SHA or 7+ for short SHA)
              if ! echo "$COMMIT_SHA" | grep -qE '^[a-fA-F0-9]{7,40}$'; then
                echo "❌ Error: Invalid commit SHA format. Must be 7-40 hexadecimal characters."
                exit 1
              fi

              # Verify the commit exists in the repository
              if ! git rev-parse --verify "${COMMIT_SHA}^{commit}" >/dev/null 2>&1; then
                echo "❌ Error: Commit SHA '${COMMIT_SHA}' does not exist in the repository."
                echo "Please provide a valid commit SHA from the main branch."
                exit 1
              fi

              # Get the full SHA if a short SHA was provided
              COMMIT_SHA=$(git rev-parse --verify "${COMMIT_SHA}^{commit}")
              echo "✅ Commit SHA validated successfully"
              echo "Using manually provided commit SHA: $COMMIT_SHA"
            else
              COMMIT_SHA="${{ github.sha }}"
              echo "Using current commit SHA: $COMMIT_SHA"
            fi
          else
            # Automatic trigger from CI workflow
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
            # If empty, use github.sha as fallback
            if [ -z "$COMMIT_SHA" ]; then
              COMMIT_SHA="${{ github.sha }}"
              echo "Using github.sha as fallback: $COMMIT_SHA"
            fi
          fi

          # Store COMMIT_SHA as output for use in subsequent steps
          echo "commit_sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Verify image exists in registry
        run: |
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')
          
          echo "Verifying image existence: ${FULL_IMAGE}"
          # We use docker manifest inspect which is available in modern docker versions
          if ! docker manifest inspect "${FULL_IMAGE}" > /dev/null 2>&1; then
            echo "❌ Error: Docker image ${FULL_IMAGE} not found in registry."
            echo "The CI pipeline might have failed to build or push the image for this commit."
            exit 1
          fi
          echo "✅ Image found in registry"

      - name: Determine trigger branch
        id: branch
        run: |
          TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch || 'main' }}"
          echo "trigger_branch=${TRIGGER_BRANCH}" >> $GITHUB_OUTPUT
          if [ "$TRIGGER_BRANCH" = "main" ]; then
            echo "infra_branch=main" >> $GITHUB_OUTPUT
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            echo "infra_branch=deploy/preprod" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: whispr-messenger/infrastructure
          path: infrastructure
          ref: ${{ steps.branch.outputs.infra_branch }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Validate deployment and migration-job manifest paths
        run: |
          BASE="infrastructure/k8s/whispr"

          # Always validate preprod
          MANIFEST_PATH="${BASE}/preprod/user-service/deployment.yaml"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "❌ Error: Deployment manifest not found at $MANIFEST_PATH"
            exit 1
          fi
          echo "✅ Deployment manifest found at $MANIFEST_PATH"

          MIGRATION_PATH="${BASE}/preprod/user-service/migration-job.yaml"
          if [ -f "$MIGRATION_PATH" ]; then
            echo "✅ Migration job manifest found at $MIGRATION_PATH"
          else
            echo "ℹ️ No migration-job.yaml in preprod/ — skipping"
          fi

          # Validate prod and production dirs only on main
          if [ "${{ steps.branch.outputs.is_main }}" = "true" ]; then
            for DIR in prod production; do
              DEPLOY_PATH="${BASE}/${DIR}/user-service/deployment.yaml"
              if [ ! -f "$DEPLOY_PATH" ]; then
                echo "❌ Error: Deployment manifest not found at $DEPLOY_PATH"
                exit 1
              fi
              echo "✅ Deployment manifest found at $DEPLOY_PATH"
            done

            # Validate migration-job only in prod (NOT production)
            PROD_MIGRATION="${BASE}/prod/user-service/migration-job.yaml"
            if [ -f "$PROD_MIGRATION" ]; then
              echo "✅ Migration job manifest found at $PROD_MIGRATION"
            else
              echo "ℹ️ No migration-job.yaml in prod/ — skipping"
            fi
          fi

      - name: Update image tag in deployment
        id: update_image
        run: |
          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")
          IMAGE_TAG="sha-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"
          FULL_IMAGE=$(echo "${FULL_IMAGE}" | tr '[:upper:]' '[:lower:]')
          BASE="infrastructure/k8s/whispr"

          echo "Commit SHA: $COMMIT_SHA"
          echo "Short SHA: $SHORT_SHA"
          echo "Image tag: $IMAGE_TAG"
          echo "Updating deployment image to: ${FULL_IMAGE}"

          # Always update preprod
          yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${BASE}/preprod/user-service/deployment.yaml"
          if [ -f "${BASE}/preprod/user-service/migration-job.yaml" ]; then
            yq -i 'select(.kind == "Job").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${BASE}/preprod/user-service/migration-job.yaml"
          fi

          # On main, also update prod and production
          if [ "${{ steps.branch.outputs.is_main }}" = "true" ]; then
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${BASE}/prod/user-service/deployment.yaml"
            yq -i 'select(.kind == "Deployment").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${BASE}/production/user-service/deployment.yaml"

            # Update migration-job in prod only (NOT production)
            if [ -f "${BASE}/prod/user-service/migration-job.yaml" ]; then
              yq -i 'select(.kind == "Job").spec.template.spec.containers[0].image = "'"${FULL_IMAGE}"'"' "${BASE}/prod/user-service/migration-job.yaml"
            fi
          fi

      - name: Verify update
        run: |
          BASE="infrastructure/k8s/whispr"
          echo "=== preprod ==="
          echo "Deployment:"
          yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' "${BASE}/preprod/user-service/deployment.yaml"
          if [ -f "${BASE}/preprod/user-service/migration-job.yaml" ]; then
            echo "Migration job:"
            yq 'select(.kind == "Job").spec.template.spec.containers[0].image' "${BASE}/preprod/user-service/migration-job.yaml"
          fi

          if [ "${{ steps.branch.outputs.is_main }}" = "true" ]; then
            echo "=== prod ==="
            echo "Deployment:"
            yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' "${BASE}/prod/user-service/deployment.yaml"
            if [ -f "${BASE}/prod/user-service/migration-job.yaml" ]; then
              echo "Migration job:"
              yq 'select(.kind == "Job").spec.template.spec.containers[0].image' "${BASE}/prod/user-service/migration-job.yaml"
            fi
            echo "=== production ==="
            echo "Deployment:"
            yq 'select(.kind == "Deployment").spec.template.spec.containers[0].image' "${BASE}/production/user-service/deployment.yaml"
          fi

      - name: Commit and push changes
        working-directory: infrastructure
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          COMMIT_SHA="${{ steps.validate_commit.outputs.commit_sha }}"
          SHORT_SHA=$(printf "%.7s" "$COMMIT_SHA")

          # Build commit message based on trigger type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMIT_MSG="🔧 chore(deploy/user-service): update image to ${SHORT_SHA} (manual trigger)"
          else
            COMMIT_MSG="🔧 chore(deploy/user-service): update image to ${SHORT_SHA}"
          fi

          git add -A
          git commit -m "${COMMIT_MSG}"

          # Push to the correct branch in infrastructure repo
          INFRA_BRANCH="${{ steps.branch.outputs.infra_branch }}"
          git pull origin "${INFRA_BRANCH}" --rebase
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/whispr-messenger/infrastructure.git HEAD:"${INFRA_BRANCH}"
