name: 🚀 CI Pipeline

on:
  push:
    branches: [main, develop, deploy/avant-preprod, deploy/preprod]
    paths-ignore:
      - '**.md'
      - 'documentation/**'
  pull_request:
    branches: [main, develop, deploy/avant-preprod, deploy/preprod]
    paths-ignore:
      - '**.md'
      - 'documentation/**'

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  actions: read
  attestations: write
  id-token: write

env:
  NODE_VERSION: '22'

jobs:
  # ================================
  # Tests and Quality
  # ================================
  tests:
    name: 🧪 Quality Assurance
    uses: ./.github/workflows/tests.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ================================
  # Security Scanning
  # ================================
  security:
    name: 🛡️ Security Analysis
    uses: ./.github/workflows/trivy.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}

  # ================================
  # Docker Build
  # ================================
  docker:
    name: 📦 Container Registry
    needs: [security]
    if: ${{ needs.security.result == 'success' }}
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}