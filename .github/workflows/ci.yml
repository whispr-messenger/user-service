name: 🚀 CI Pipeline

on:
  push:
    paths-ignore:
      - '**.md'
      - 'documentation/**'

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
  security-events: write
  actions: read
  attestations: write
  id-token: write

env:
  NODE_VERSION: '22.21'

jobs:
  # ================================
  # Tests and Quality
  # ================================
  tests:
    name: 🧪 Quality Assurance
    uses: ./.github/workflows/tests.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ================================
  # Security Scanning
  # ================================
  security:
    name: 🛡️ Security Analysis
    uses: ./.github/workflows/trivy.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod') && github.event_name == 'push' }}

  # ================================
  # CodeQL Analysis
  # ================================
  codeql:
    name: 🔐 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  # ================================
  # Docker Build & Push (deploy branches only)
  # ================================
  docker:
    name: 📦 Container Registry
    needs: [tests, security]
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deploy/preprod')
    uses: ./.github/workflows/docker.yml
    with:
      ref: ${{ github.ref }}
      should_deploy: 'true'