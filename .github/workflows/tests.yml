name: 🧪 Quality Assurance

on:
  repository_dispatch:
    types: [run-tests]
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      should_deploy:
        required: false
        type: string
        default: 'false'
    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  test-and-quality:
    name: 🔍 Code Analysis & Testing
    runs-on: ubuntu-latest

    ####################################################################################################
    # Services
    ####################################################################################################
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      ####################################################################################################
      # Setup
      ####################################################################################################
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.event.client_payload.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      ####################################################################################################
      # Linting and Formatting
      ####################################################################################################
      - name: Run linting
        run: npm run lint

      - name: Run format check
        run: |
          npx prettier --write "src/**/*.ts" "test/**/*.ts"
          git diff --exit-code

      ####################################################################################################
      # Unit and E2E Tests
      ####################################################################################################
      - name: Run unit tests
        run: npm run test:cov
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test
          DB_PASSWORD: test
          DB_NAME: test_db
          DB_SYNCHRONIZE: true
          DB_LOGGING: false
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_URL: redis://localhost:6379/0

      - name: Initialize database schemas
        run: |
          PGPASSWORD=test psql -h localhost -U test -d test_db -c "CREATE SCHEMA IF NOT EXISTS users; GRANT ALL ON SCHEMA users TO test;"

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test
          DB_PASSWORD: test
          DB_NAME: test_db
          DB_SYNCHRONIZE: true
          DB_LOGGING: false
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-jwt-secret
          JWT_JWKS_URL: http://localhost/.well-known/jwks.json
          JWT_ISSUER: https://auth.whispr.test
          JWT_AUDIENCE: whispr-user-service
          HTTP_PORT: 3000

      ####################################################################################################
      # SonarCloud Analysis (all branches — enables PR decoration and quality gate enforcement)
      ####################################################################################################
      - name: Check SonarCloud token
        id: check-secrets
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -n "$SONAR_TOKEN" ]]; then
            echo "secrets-available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets-available=false" >> $GITHUB_OUTPUT
            echo "⚠️ SONAR_TOKEN not configured. Skipping SonarCloud analysis."
          fi

      - name: SonarCloud Analysis
        if: ${{ steps.check-secrets.outputs.secrets-available == 'true' }}
        uses: sonarsource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarCloud Quality Gate
        if: ${{ steps.check-secrets.outputs.secrets-available == 'true' }}
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage/lcov.info
      #     flags: unittests
      #     name: codecov-umbrella

      ####################################################################################################
      # SBOM - Supply Chain Governance
      ####################################################################################################
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 30